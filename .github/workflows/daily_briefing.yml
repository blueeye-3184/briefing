name: Daily Gemini-Notion Briefing (KST Optimized)

on:
  schedule:
    # 매일 한국 시간(KST) 오전 08:17에 실행 (UTC 23:17)
    - cron: '17 23 * * *'
  workflow_dispatch: 

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 루트에 있는 requirements.txt 사용 (없을 경우 필수 패키지 직접 설치)
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else
            pip install google-genai requests tenacity python-dotenv
          fi

      - name: Run Daily Briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PARENT_PAGE_ID: ${{ secrets.PARENT_PAGE_ID }}
        run: |
          # 루트에 있는 스크립트 실행
          python briefing_auto.py
